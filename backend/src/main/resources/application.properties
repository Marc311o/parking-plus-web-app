spring.datasource.url=jdbc:postgresql://localhost:5433/parking_db?sslmode=disable
spring.datasource.username=user
spring.datasource.password=password
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
jwt.secret=${JWT_SECRET:a-long-random-secret-for-development-only}

# Email configuration - set credentials via environment variables or in application-local.properties (gitignored)
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=${MAIL_USERNAME:}
spring.mail.password=${MAIL_PASSWORD:}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true

app.admin.password=${APP_ADMIN_PASSWORD:admin123}
app.testdata.enabled=${APP_TESTDATA_ENABLED:true}

# Swagger UI configuration
springdoc.swagger-ui.operations-sorter=method
springdoc.swagger-ui.tags-sorter=alpha
springdoc.swagger-ui.display-query-params=true
springdoc.swagger-ui.display-request-duration=true





